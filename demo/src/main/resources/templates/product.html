<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>若い女性ファッション＆雑貨ブランド向け 無料ホームページテンプレート tp_fashion2</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/product.css}">

</head>
<body>

<div id="container">

<header>
<h1 id="logo"><a href="index.html"><img th:src="@{/images/logo-simple.png}" alt="あなたのサイト名"></a></h1>
</header>
<header th:replace="~{fragments/header :: header}"></header>
<div id="contents">
    <section class="product-detail">
        <!-- =========================
             左側：商品画像
        ========================== -->
        <div class="product-gallery">
            <!-- サムネ -->
            <!-- <div class="thumbnail-list">
                <img th:src="@{/images/product1.jpg}" alt="">
                <img th:src="@{/images/product2.jpg}" alt="">
                <img th:src="@{/images/product3.jpg}" alt="">
                <img th:src="@{/images/product4.jpg}" alt="">
                <img th:src="@{/images/product5.jpg}" alt="">
            </div> -->
            <!-- メイン　イメージ -->
            <div class="main-image">
                <img th:src="${product.imageUrl}" alt="ハートポイントクロップTシャツ">
            </div>
        </div>
        <!-- =========================
             右側：商品情報
        ========================== -->
	    <div class="product-info">
		    <!-- 商品名 -->
		    <h1 class="product-name" th:text="${product.productName}">
		        商品名
		    </h1>
		    <!-- 商品説明 -->
		    <p class="product-description" th:text="${product.description}">
		        商品説明
		    </p>
		
		    <!-- 価格 -->
		    <div class="price-area">
		        <p class="main-price"
		           th:text="'¥' + ${#numbers.formatInteger(product.price, 0, 'COMMA')}">
		            ¥2,248
		        </p>
		    </div>
		
		    <!-- 在庫情報 -->
		    <div class="info-table">
		        <div class="info-row">
		            <span class="label">在庫</span>
		            <span class="value"
		                  th:text="${product.stock > 0} ? '在庫あり (' + ${product.stock} + '点)' : '在庫切れ'">
		                在庫あり
		            </span>
		        </div>
		
		        <div class="info-row">
		            <span class="label">カテゴリ</span>
		            <span class="value"
		                  th:text="${product.categoryCode}">
		                TOPS
		            </span>
		        </div>
		
		        <div class="info-row">
		            <span class="label">商品ID</span>
		            <span class="value"
		                  th:text="${product.productId}">
		                1
		            </span>
		        </div>
		
		        <div class="info-row">
		            <span class="label">登録日</span>
		            <span class="value"
		                  th:text="${#temporals.format(product.createdDate, 'yyyy/MM/dd')}">
		                2026/05/19
		            </span>
		        </div>
		
		        <div class="info-row">
		            <span class="label">配送予定日</span>
		            <span class="value">
		                通常3〜7日以内に発送いたします。
		            </span>
		        </div>
		
		        <div class="info-row">
		            <span class="label">配送料</span>
		            <span class="value">
		                全国一律 ¥550<br>
		                ¥12,000以上ご購入時 送料無料
		            </span>
		        </div>
		    </div>
		
		    <!-- 数量 -->
		    <div class="option-group">
		        <label for="quantity">数量</label>
		        <input type="number"
		               id="quantity"
		               name="quantity"
		               value="1"
		               min="1"
		               th:max="${product.stock}">
		    </div>
		
		    <!-- ボタン -->
		    <div class="action-buttons">
		        <button type="button" class="favorite-btn">♡</button>
		        <button type="button"
		                class="cart-btn"
		                th:disabled="${product.stock == 0}">
		            <span th:text="${product.stock > 0} ? 'カートに入れる' : '在庫切れ'">
		                カートに入れる
		            </span>
		        </button>
		    </div>
		</div>
    </section>

</div>

<!--/#contents-->
<header th:replace="~{fragments/footer :: footer}"></header>
</div>

<!-- jQueryの読み込み -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<!-- パララックス（inview） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/protonet-jquery.inview/1.1.2/jquery.inview.min.js"></script>
<!-- 自作スクリプト -->
<script th:src="@{/js/jquery.inview_set.js}"></script>
<!-- このテンプレート専用のスクリプト -->
<script th:src="@{/js/main.js}"></script>

</body>
</html>
