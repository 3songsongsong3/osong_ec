<!DOCTYPE html>
<html lang="ja">
<head>

<body>

<div id="container">

<header>
<h1 id="logo"><a href="index.html"><img src="images/logo-simple.png" alt="あなたのサイト名"></a></h1>
</header>

<!--ヘッダー下メニュー（※開閉メニューはhtmlの下の方にあります）-->

<div id="contents">

<main>

<section>

<h2>Collection<span>コレクション</span></h2>

<div class="list-mask1">
    <div class="list inview" th:each="product : ${products}">
        <figure>
            <img th:src="@{${product.imageUrl}}"
                 th:alt="${product.productName}">
        </figure>
        <div class="text">
            <!-- 商品名 -->
            <h4 th:text="${product.productName}">タイトル</h4>
            <!-- 商品説明 -->
            <p th:text="${product.description}">
                ここに説明を書きます。サンプルテキスト。
            </p>
            <!-- 価格を表示する場合は以下を使用 -->
            <!--
            <p class="price">
                ¥<span th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')}">0</span>
            </p>
            -->
        </div>
    </div>
</div>
<!--/.list-mask1-->

</section>

</main>

</div>
<!--/#contents-->
<header th:replace="~{fragments/footer :: footer}"></header>

<!--以下の行はテンプレートの著作。削除しないで下さい。-->
